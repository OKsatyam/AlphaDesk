services:
  - type: web
    name: alphadesk-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    disk:
      name: alphadesk-storage
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: CHROMA_DB_PATH
        value: /var/data/chroma_db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: DEBUG
        value: false
      - key: DEFAULT_LLM_PROVIDER
        value: groq
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: CHROMA_COLLECTION_NAME
        value: folioai_documents
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
